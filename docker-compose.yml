# docker-compose.yml
# Weaviate + PostgreSQL for vault-memory local stack.
# Run: docker compose up -d

services:

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.36.8
    container_name: vault-memory-weaviate
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50051:50051"
    volumes:
      - weaviate_data:/var/lib/weaviate
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: ""
      HNSW_EF_CONSTRUCTION: "256"
      HNSW_MAX_CONNECTIONS: "64"
      INVERTED_INDEX_CLEANUP_INTERVAL_SECONDS: "60"
      CLUSTER_HOSTNAME: "vault-memory-node1"
      LIMIT_RESOURCES: "false"
      GO_MEMORY_LIMIT_PERCENTAGE: "80"
      LOG_LEVEL: "warning"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/v1/.well-known/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"

  postgres:
    image: postgres:16-alpine
    container_name: vault-memory-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    environment:
      POSTGRES_DB: vault_memory
      POSTGRES_USER: vault
      POSTGRES_PASSWORD: vault_local
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c max_connections=50
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault -d vault_memory"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

volumes:
  weaviate_data:
    driver: local
    labels:
      com.vault-memory.description: "Weaviate HNSW vector index"
  postgres_data:
    driver: local
    labels:
      com.vault-memory.description: "PostgreSQL temporal KG + entity graph"
