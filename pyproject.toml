[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "vault-memory"
version = "0.1.0"
description = "Always-on local memory layer for Obsidian vaults"
authors = [{name = "jd", email = "idolsfall@proton.me"}]
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "httpx>=0.27",
    "click>=8.1",
    "watchdog>=4.0",
    "weaviate-client>=4.7",
    "psycopg2-binary>=2.9",
    "sentence-transformers>=3.3",
    "rich>=13.9",
    "pydantic>=2.8",
]

[project.scripts]
vault-memory = "cli.main:cli"
vault-memoryd = "daemon.main:start"

[tool.setuptools.packages.find]
where = ["."]
include = ["daemon*", "cli*"]
